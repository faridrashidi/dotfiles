# ==========================
# General Settings
# ==========================

# Set prefix to Ctrl+a
set -g prefix C-a

# Terminal settings
set -g default-terminal "tmux-256color"

# Enable mouse support
set -g mouse on

# Position status bar at the top
set -g status-position top

# Neovim's autoread and some plugins require focus-event
set-option -g focus-events on

# Start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Notify if other windows have activity
setw -g monitor-activity on

# Renumber windows automatically when closed
set -g renumber-windows on

# Increase scrollback buffer (default 2000 is too small)
set -g history-limit 50000

# Always open two panes side by side
set-hook -g after-new-window 'split-window -h'
set-hook -g after-new-session 'split-window -h'

# ==========================
# Keybindings
# ==========================

# Split panes using | and -
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload configuration
bind r source-file $HOME/.config/tmux/tmux.conf \; display "Reloaded!"

# Session picker
bind o display-popup -E -h 90% -w 50% -d "#{pane_current_path}" -T "Sesh" "sesh picker -i"

# ==========================
# Plugins
# ==========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-floax'

# ==========================
# Plugin Configuration
# ==========================

# --- Catppuccin Theme ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "none"
set-option -sa terminal-overrides ",xterm*:Tc"

# Status bar separators
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Status bar content
set -g status-right-length 100
set -g status-right ""
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"

# --- Resurrect & Continuum ---
set -g @continuum-restore 'off'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# --- Floax ---
set -g @floax-bind 'p'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'

# ==========================
# TPM Initialization
# ==========================

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.cache/tmux/plugins/"

# Auto-install TPM if not present
if-shell "test ! -d $HOME/.cache/tmux/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm $HOME/.cache/tmux/tpm && $HOME/.cache/tmux/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager
run '$HOME/.cache/tmux/tpm/tpm'
# set -g window-status-current-format ""
# set -g window-status-format ""
set -g window-status-current-format "#[fg=#cba6f7,bg=default]#[fg=#1e1e2e,bg=#cba6f7]●#[fg=#cba6f7,bg=default]"
set -g window-status-format "#[fg=#585b70,bg=default]#[fg=#cdd6f4,bg=#585b70]#I#[fg=#585b70,bg=default]"
