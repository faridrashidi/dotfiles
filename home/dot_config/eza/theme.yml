colourful: true
# Gruvbox Material Dark
# fg:     #d4be98
# red:    #ea6962
# green:  #a9b665
# yellow: #d8a657
# blue:   #7daea3
# purple: #d3869b
# aqua:   #89b482
# orange: #e78a4e
# gray:   #928374

