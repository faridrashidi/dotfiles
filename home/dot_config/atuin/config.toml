style = "compact"
search_mode = "fuzzy"
inline_height = 10
show_preview = false
show_help = false
show_tabs = false
enter_accept = true
secrets_filter = true
history_filter = [
    "^ls( .*)?$",
    "^cd( .*)?$",
    "^clear$",
    "^exit$",
    "^pwd$",
    "^history$",
    "^c$",
    "^z( .*)?$",
    "^zi( .*)?$",
]
